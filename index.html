<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Habits</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0d0d14">
  <!-- iOS standalone mode -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Habits">
  <link rel="icon" href="/favicon.ico" sizes="48x48">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <!-- Supabase JS client — defer so it doesn't block page render; crossorigin for SW caching -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer crossorigin="anonymous"></script>
  <!-- Lucide Icons — defer matches Supabase script; crossorigin for SW caching -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.563.0/dist/umd/lucide.min.js" defer crossorigin="anonymous"></script>
  <!-- Chart.js — used for the weight trend chart on Stats -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ── Test Mode Banner ────────────────────────────────────────────────── -->
  <div class="test-banner" id="test-banner" hidden>
    TEST MODE — no real data affected
    <button class="test-reset-btn" id="test-reset-btn">Reset</button>
    <button class="test-reset-btn" id="test-exit-btn">Exit</button>
  </div>

  <div class="container">
    <header>
      <h1>Habits</h1>
      <div class="date-label" id="date-label"></div>
    </header>

    <!-- ── Today view ─────────────────────────────────────────────────────── -->
    <div id="view-today">
      <div class="suggestion-card" id="suggestion-card">
        <div class="suggestion-eyebrow" id="suggestion-eyebrow">Next Up</div>
        <div class="hero-icon-wrap" id="hero-icon-wrap">
          <i data-lucide="dumbbell"></i>
        </div>
        <div class="suggestion-name" id="suggestion-name"></div>
        <div class="suggestion-subtitle" id="suggestion-subtitle"></div>
        <div class="card-actions">
          <button class="done-btn" id="main-done-btn">Done!</button>
          <button class="skip-btn" id="log-other-btn">Log activity</button>
          <button class="undo-btn" id="undo-btn" hidden></button>
        </div>
      </div>

      <div class="tomorrow-preview">
        <span class="tomorrow-label">Tomorrow</span>
        <span class="tomorrow-name" id="tomorrow-name"></span>
      </div>

      <!-- Journal card -->
      <div class="today-card" id="journal-card">
        <div class="today-card-label">Journal</div>
        <div id="journal-card-content"></div>
      </div>

      <!-- Weight card -->
      <div class="today-card" id="weight-card">
        <div class="today-card-label">Weight</div>
        <div id="weight-card-content"></div>
      </div>

      <div id="version-stamp"></div>
    </div>

    <!-- ── History view ───────────────────────────────────────────────────── -->
    <div id="view-history" hidden>
      <div class="history-tabs">
        <button class="htab active" id="htab-calendar">Calendar</button>
        <button class="htab" id="htab-list">List</button>
        <button class="htab" id="htab-schedule">Schedule</button>
      </div>
      <div id="hview-calendar"></div>
      <div id="hview-list" hidden></div>
      <div id="hview-schedule" hidden></div>
    </div>

    <!-- ── Settings view ─────────────────────────────────────────────────── -->
    <div id="view-settings" hidden>
      <h2 class="settings-heading">Settings</h2>
      <div class="settings-section">
        <button class="settings-sync-btn" id="sync-btn">
          <i data-lucide="refresh-cw"></i>
          Sync now
        </button>
      </div>
    </div>

    <!-- ── Stats view ─────────────────────────────────────────────────────── -->
    <div id="view-stats" hidden>
      <div class="stats-range-toggle">
        <button class="stats-toggle-btn active" id="stats-btn-30">Last 30 Days</button>
        <button class="stats-toggle-btn" id="stats-btn-all">All Time</button>
      </div>
      <div class="stats-section" id="weight-chart-section">
        <div class="stats-section-label">Weight Trend</div>
        <div class="stats-card weight-chart-card">
          <div class="weight-chart-empty" id="weight-chart-empty" hidden>Log a few weigh-ins to see your trend.</div>
          <div class="weight-chart-wrap" id="weight-chart-wrap" hidden>
            <canvas id="weight-chart-canvas" aria-label="Weight trend chart"></canvas>
          </div>
        </div>
      </div>
      <div id="stats-content"></div>
    </div>

  </div>

  <!-- ── Weight Modal ───────────────────────────────────────────────────── -->
  <div class="modal-overlay" id="weight-modal" hidden role="dialog" aria-modal="true" aria-labelledby="weight-modal-title">
    <div class="modal-sheet">
      <div class="modal-title" id="weight-modal-title">Log Weight</div>
      <div class="weight-input-row">
        <label for="weight-input" class="sr-only">Weight in lbs</label>
        <input class="weight-input" id="weight-input" type="number"
               inputmode="decimal" placeholder="0.0" min="50" max="999" step="0.1">
        <span class="weight-unit">lbs</span>
      </div>
      <div class="modal-actions">
        <button class="modal-cancel-btn" id="weight-cancel-btn">Cancel</button>
        <button class="modal-confirm-btn" id="weight-save-btn" disabled>Save</button>
      </div>
    </div>
  </div>

  <!-- ── Journal Modal ──────────────────────────────────────────────────── -->
  <div class="modal-overlay" id="journal-modal" hidden role="dialog" aria-modal="true" aria-labelledby="journal-modal-title">
    <div class="modal-sheet">
      <div class="modal-title" id="journal-modal-title">Today's Journal</div>

      <div id="journal-form">
        <div class="journal-field">
          <label class="journal-field-label" for="journal-intention">What's your intention for today?</label>
          <textarea class="journal-textarea" id="journal-intention"
                    placeholder="Enter your intention…" rows="3"></textarea>
        </div>

        <div class="journal-field">
          <label class="journal-field-label" for="journal-gratitude">What are you grateful for?</label>
          <textarea class="journal-textarea" id="journal-gratitude"
                    placeholder="Enter what you're grateful for…" rows="3"></textarea>
        </div>

        <div class="journal-field">
          <label class="journal-field-label" for="journal-one-thing">What's the one thing you'll get done today?</label>
          <textarea class="journal-textarea" id="journal-one-thing"
                    placeholder="Enter your one thing…" rows="3"></textarea>
        </div>

        <!-- Gratitude nudge (shown when a similar entry is found in the last 7 days) -->
        <div class="journal-nudge" id="journal-nudge" hidden>
          <div class="journal-nudge-text">You mentioned something similar recently — still want to use it?</div>
          <div class="journal-nudge-actions">
            <button class="journal-nudge-yes" id="journal-nudge-yes">Yes</button>
            <button class="journal-nudge-change" id="journal-nudge-change">Change it</button>
          </div>
        </div>

        <div class="modal-actions">
          <button class="modal-cancel-btn" id="journal-cancel-btn">Cancel</button>
          <button class="modal-confirm-btn" id="journal-save-btn">Save</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- ── Log Activity Chooser Modal ─────────────────────────────────────── -->
  <div class="modal-overlay" id="log-activity-modal" hidden role="dialog" aria-modal="true" aria-labelledby="log-activity-modal-title">
    <div class="modal-sheet">
      <div class="modal-title" id="log-activity-modal-title">Log activity</div>
      <div class="log-activity-options" id="log-activity-options"></div>
      <button class="modal-cancel-btn" id="log-activity-cancel-btn">Cancel</button>
    </div>
  </div>

  <!-- ── Other Activity Modal ────────────────────────────────────────────── -->
  <div class="modal-overlay" id="other-activity-modal" hidden>
    <div class="modal-sheet">
      <div class="modal-title">Log Other Activity</div>
      <div class="modal-chips" id="other-activity-chips"></div>
      <input class="modal-input" id="other-activity-input" type="text"
             placeholder="Activity name…" maxlength="100" autocomplete="off">
      <div class="modal-actions">
        <button class="modal-cancel-btn" id="modal-cancel-btn">Cancel</button>
        <button class="modal-confirm-btn" id="modal-confirm-btn" disabled>Log It</button>
      </div>
    </div>
  </div>

  <!-- ── Skip Today Modal ──────────────────────────────────────────────── -->
  <div class="modal-overlay" id="skip-modal" hidden>
    <div class="modal-sheet">
      <div class="modal-icon is-rest">
        <i data-lucide="moon"></i>
      </div>
      <div class="modal-title">Rest Day</div>
      <div class="modal-chips" id="skip-reason-chips"></div>
      <input class="modal-input" id="skip-reason-input" type="text"
             placeholder="Reason (optional)" maxlength="100" autocomplete="off">
      <div class="modal-actions">
        <button class="modal-cancel-btn" id="skip-cancel-btn">Cancel</button>
        <button class="modal-confirm-btn" id="skip-confirm-btn">Skip Today</button>
      </div>
    </div>
  </div>

  <!-- ── Backfill Modal ───────────────────────────────────────────────────── -->
  <div class="modal-overlay" id="backfill-modal" hidden>
    <div class="modal-sheet" id="backfill-sheet">
      <button class="backfill-close-btn" id="backfill-x-btn" type="button" aria-label="Close">
        <i data-lucide="x"></i>
      </button>
      <div class="backfill-date-label" id="backfill-date-label"></div>

      <!-- Read-only view (shown when entry already exists) -->
      <div id="backfill-readonly" hidden>
        <div class="backfill-readonly-entry">
          <div class="backfill-readonly-icon" id="backfill-readonly-icon">
            <i data-lucide="dumbbell"></i>
          </div>
          <div class="backfill-readonly-name" id="backfill-readonly-name"></div>
        </div>
        <div class="backfill-weight-section" id="backfill-weight-section">
          <div class="backfill-section-label">Weight</div>
          <div class="backfill-weight-value" id="backfill-weight-value"></div>
        </div>
        <!-- Journal entry for this past day (shown if one exists) -->
        <div id="backfill-journal-section" hidden>
          <div id="backfill-journal-content"></div>
        </div>
        <div class="backfill-readonly-actions">
          <button class="modal-cancel-btn" id="backfill-edit-btn">Edit Exercise</button>
          <button class="modal-confirm-btn" id="backfill-weight-btn">Add Weight</button>
        </div>
      </div>

      <!-- Edit / new-entry view -->
      <div id="backfill-edit-view">
        <div class="backfill-options" id="backfill-options"></div>
        <div id="backfill-other-section" hidden>
          <div class="modal-chips" id="backfill-other-chips"></div>
          <input class="modal-input" id="backfill-other-input" type="text"
                 placeholder="Activity name…" maxlength="100" autocomplete="off">
        </div>
        <div class="modal-actions">
          <button class="modal-cancel-btn" id="backfill-cancel-btn">Cancel</button>
          <button class="modal-confirm-btn" id="backfill-confirm-btn" disabled>Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Bottom Navigation ──────────────────────────────────────────────── -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-today-btn">
      <i data-lucide="dumbbell"></i>
      <span>Today</span>
    </button>
    <button class="nav-btn" id="nav-history-btn">
      <i data-lucide="calendar"></i>
      <span>Log</span>
    </button>
    <button class="nav-btn" id="nav-stats-btn">
      <i data-lucide="bar-chart-2"></i>
      <span>Stats</span>
    </button>
    <button class="nav-btn" id="nav-settings-btn">
      <i data-lucide="settings"></i>
      <span>Settings</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
